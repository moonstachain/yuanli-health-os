<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#05070b" />
<title>原力健康 OS｜Mobile iOS</title>
<style>
:root{color-scheme:dark;--bg:#05070b;--card:#0e1417;--card2:#121a1f;--line:#263036;--text:#f5f1e8;--muted:#98a19d;--gold:#c9a96a;--teal:#6eb7a8;--amber:#d2a24c;--red:#c97a72;--green:#7fb88a;--blue:#5ac8fa;--r:24px;--font:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;background:var(--bg);font-family:var(--font);color:var(--text)}body{background:radial-gradient(circle at 50% -10%,rgba(110,183,168,.14),transparent 34%),linear-gradient(180deg,#05070b,#070b0d 55%,#040606)}.phone{width:100%;max-width:480px;margin:0 auto;min-height:100vh;padding:calc(14px + env(safe-area-inset-top)) 14px calc(92px + env(safe-area-inset-bottom))}.top{position:sticky;top:0;z-index:4;margin:calc(-14px - env(safe-area-inset-top)) -14px 12px;padding:calc(12px + env(safe-area-inset-top)) 14px 10px;background:rgba(5,7,11,.88);backdrop-filter:blur(18px);border-bottom:1px solid rgba(255,255,255,.06)}.bar{display:flex;align-items:center;justify-content:space-between;gap:10px}.brand{font-weight:900;letter-spacing:-.02em}.chip{border:1px solid var(--line);background:#0b1012;border-radius:999px;padding:6px 9px;color:var(--muted);font-size:11px}.hero{border:1px solid var(--line);border-radius:28px;background:linear-gradient(180deg,#10181b,#0b1012);padding:18px;box-shadow:0 16px 50px rgba(0,0,0,.28)}.eyebrow{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);font-weight:900}.hero h1{font-size:28px;line-height:1.06;letter-spacing:-.04em;margin:10px 0 8px}.hero p{margin:0;color:#c2cbc6;line-height:1.55;font-size:14px}.status{display:inline-flex;margin-top:12px;border-radius:999px;padding:7px 10px;background:rgba(210,162,76,.12);color:#f0d28a;font-weight:900;font-size:12px}.section{display:none;animation:fade .18s ease}.section.active{display:block}@keyframes fade{from{opacity:.6;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}.h2{display:flex;align-items:end;justify-content:space-between;margin:18px 2px 10px}.h2 h2{font-size:20px;margin:0;letter-spacing:-.03em}.h2 span{font-size:12px;color:var(--muted)}.card{border:1px solid var(--line);border-radius:var(--r);background:linear-gradient(180deg,var(--card),#090e10);padding:15px;margin:10px 0}.action{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center}.action b,.card b{display:block;font-size:16px}.action p,.card p{margin:6px 0 0;color:#aeb8b2;font-size:13px;line-height:1.55}.btn{border:0;border-radius:16px;padding:11px 13px;min-width:70px;background:var(--text);color:#08100d;font-weight:900;font-size:13px}.btn.done{background:var(--green);color:#051007}.tiny{font-size:12px;color:var(--muted);line-height:1.5}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.kpi{border:1px solid var(--line);border-radius:20px;padding:13px;background:#091011}.kpi small{display:block;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.06em}.kpi b{font-size:20px;margin-top:6px}.progress{height:9px;background:#182022;border-radius:999px;overflow:hidden;margin:10px 0}.progress i{display:block;height:100%;background:linear-gradient(90deg,var(--teal),var(--gold));border-radius:999px}.coach{display:grid;gap:9px}.coach .row{display:grid;grid-template-columns:74px 1fr;gap:10px;border-top:1px solid rgba(255,255,255,.07);padding-top:10px}.coach .row:first-child{border-top:0;padding-top:0}.coach em{font-style:normal;color:var(--gold);font-size:12px;font-weight:900}.coach span{color:#b9c2bd;font-size:13px;line-height:1.5}.steps{display:grid;gap:8px}.step{border:1px solid var(--line);border-radius:18px;background:#091011;padding:12px;display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center}.dot{width:22px;height:22px;border-radius:50%;border:1px solid var(--line);display:grid;place-items:center;color:var(--muted);font-size:11px}.step.done .dot{background:var(--green);color:#041007}.trend{overflow:hidden}.spark{width:100%;height:92px;margin-top:8px}.spark path{fill:none;stroke:var(--teal);stroke-width:3;stroke-linecap:round;stroke-linejoin:round}.spark circle{fill:var(--text)}.spark text{fill:var(--muted);font-size:10px}.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}.day{border:1px solid var(--line);background:#091011;color:var(--text);border-radius:14px;padding:9px 2px;font-weight:900}.day small{display:block;color:var(--muted);font-size:10px;margin-top:4px}.day.done{background:var(--green);color:#041007}.record{display:flex;align-items:center;justify-content:space-between;gap:12px;border-top:1px solid rgba(255,255,255,.07);padding:12px 0}.record:first-child{border-top:0}.record span{font-size:13px;color:#b9c2bd}.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:10;padding:8px 10px calc(8px + env(safe-area-inset-bottom));background:rgba(5,7,11,.88);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.09)}.tabs{max-width:480px;margin:0 auto;display:grid;grid-template-columns:repeat(5,1fr);gap:6px}.tab{border:0;background:transparent;color:var(--muted);border-radius:18px;padding:8px 3px;font-size:11px;font-weight:800}.tab i{display:block;font-style:normal;font-size:18px;margin-bottom:2px}.tab.active{background:rgba(201,169,106,.12);color:var(--text)}.warn{color:#f1cf84}.bad{color:#e0a19b}.good{color:#a5d6ad}@media(min-width:700px){body{display:grid;place-items:start center}.phone{border-left:1px solid var(--line);border-right:1px solid var(--line)}}
</style>
</head>
<body>
<div class="phone">
<header class="top"><div class="bar"><div class="brand">原力健康 OS</div><div class="chip" id="sourceChip">loading</div></div></header>
<section class="hero"><div class="eyebrow">Mobile iOS Agent</div><h1 id="stateTitle">读取今日状态中</h1><p id="stateLead">正在加载 data/demo-health.json。移动版只保留今天最重要的行动。</p><div class="status" id="stateBadge">Agent</div></section>
<main>
<section id="tab-today" class="section active"><div class="h2"><h2>今日三动作</h2><span id="rangeText">—</span></div><div id="todayActions"></div><div class="h2"><h2>本周节律</h2><span>一眼判断</span></div><div class="grid2" id="weeklyRhythm"></div></section>
<section id="tab-action" class="section"><div class="h2"><h2>行动教练</h2><span>照着做</span></div><div id="zone2Coach"></div><div id="sleepCoach"></div><div id="walkCoach"></div></section>
<section id="tab-trend" class="section"><div class="h2"><h2>趋势摘要</h2><span>只看方向</span></div><div id="trendCards"></div></section>
<section id="tab-exp" class="section"><div class="h2"><h2>14天实验</h2><span id="expCount">0/14</span></div><div id="experimentBox"></div></section>
<section id="tab-record" class="section"><div class="h2"><h2>档案</h2><span>报告与边界</span></div><div id="recordBox"></div></section>
</main>
</div>
<nav class="tabbar"><div class="tabs"><button class="tab active" data-tab="today"><i>●</i>今日</button><button class="tab" data-tab="action"><i>▶</i>行动</button><button class="tab" data-tab="trend"><i>⌁</i>趋势</button><button class="tab" data-tab="exp"><i>◇</i>实验</button><button class="tab" data-tab="record"><i>▣</i>档案</button></div></nav>
<script src="src/mobile-agent-core.js"></script>
</body>
</html>
